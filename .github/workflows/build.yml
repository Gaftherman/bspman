name: C/C++ CI

on: 
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:

jobs:
  build-windows:
    runs-on: windows-2022
  
    steps: 
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Build release 
      run: |
        mkdir build && cd build
        cmake ..
        cmake --build . --config Release

    - name: Generate AngelScript API (as.predefined)
      run: |
        cd build\Release
        .\bspguy.exe -dumpapi
      shell: cmd

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: bspguy-windows
        path: |
          build/Release/bspguy.exe
          build/Release/as.predefined

  build-linux:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'true'
    
    - name: Download and install dependencies
      run: |
        sudo apt update
        sudo apt install -y libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libglfw3-dev libglew-dev libxxf86vm-dev

    - name: Build release
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=RELEASE
        make

    - name: Generate AngelScript API (as.predefined)
      run: |
        cd build
        ./bspguy -dumpapi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: bspguy-linux
        path: |
          build/bspguy
          build/as.predefined

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write

    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bspguy-windows
          path: bspguy-windows

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bspguy-linux
          path: bspguy-linux

      - name: Zip Artifacts
        run: |
          cd bspguy-windows && zip -r ../bspguy-windows.zip . && cd ..
          cd bspguy-linux && zip -r ../bspguy-linux.zip . && cd ..

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bspguy-windows.zip
            bspguy-linux.zip
          generate_release_notes: true